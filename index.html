<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing you</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f3 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #4a3a3a;
            position: relative;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .flower-bg {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,182,193,0.2) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            pointer-events: none;
        }
        .flower-1 { top: -100px; right: -100px; }
        .flower-2 { bottom: -100px; left: -100px; }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px -15px rgba(220, 150, 160, 0.15);
        }

        .heart-glow {
            filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.4));
        }

        .spotify-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            background: rgba(255, 255, 255, 0.4);
        }

        /* Password Overlay Styling */
        #password-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: linear-gradient(135deg, #fff5f5 0%, #fce4ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pass-input {
            border-bottom: 2px solid #fda4af;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }

        .pass-input:focus {
            border-bottom-color: #fb7185;
        }

        .hidden-content {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(20px);
            transition: all 1s ease-out;
            pointer-events: none;
        }

        .revealed-content {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="flower-bg flower-1"></div>
    <div class="flower-bg flower-2"></div>

    <!-- Password Protection Screen -->
    <div id="password-overlay">
        <div class="text-center p-8 max-w-xs w-full">
            <div class="inline-flex items-center justify-center w-12 h-12 mb-6 rounded-full bg-rose-50 heart-glow">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#fb7185" stroke="#fb7185" stroke-width="1.5">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
                </svg>
            </div>
            <h2 class="serif text-2xl text-rose-900 mb-6 italic">Enter Password</h2>
            <!-- Updated input with inputmode="numeric" and pattern to show keypad -->
            <input type="password" id="pass-field" inputmode="numeric" pattern="[0-9]*" class="pass-input w-full text-center text-2xl tracking-[0.5em] text-rose-800 py-2" maxlength="4" placeholder="••••" autofocus>
            <p id="error-msg" class="text-rose-400 text-xs mt-4 opacity-0 transition-opacity">Incorrect password, please try again.</p>
        </div>
    </div>

    <!-- Main Content (Hidden initially) -->
    <div id="main-content" class="hidden-content">
        <div class="glass-card max-w-md w-full rounded-[2.5rem] p-10 md:p-14 text-center" id="main-card">
            <header class="mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-full bg-rose-50 heart-glow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#fb7185" stroke="#fb7185" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
                    </svg>
                </div>
                <h1 class="text-xs font-semibold tracking-[0.2em] text-rose-400 uppercase mb-2">In Loving Memory</h1>
                <p class="serif text-2xl italic text-rose-900">October 29, 2025</p>
            </header>

            <div class="space-y-8">
                <div>
                    <span id="day-count" class="serif text-8xl md:text-9xl font-medium text-rose-950 tabular-nums leading-none">0</span>
                    <p class="text-rose-400/80 mt-4 text-sm font-medium tracking-widest uppercase">Total Days</p>
                </div>

                <div class="grid grid-cols-3 gap-4 py-6 border-y border-rose-100">
                    <div class="space-y-1">
                        <span id="year-count" class="serif block text-3xl text-rose-900">0</span>
                        <span class="text-[10px] text-rose-300 uppercase tracking-widest font-bold">Years</span>
                    </div>
                    <div class="space-y-1 border-x border-rose-100">
                        <span id="month-count" class="serif block text-3xl text-rose-900">0</span>
                        <span class="text-[10px] text-rose-300 uppercase tracking-widest font-bold">Months</span>
                    </div>
                    <div class="space-y-1">
                        <span id="detail-day-count" class="serif block text-3xl text-rose-900">0</span>
                        <span class="text-[10px] text-rose-300 uppercase tracking-widest font-bold">Days</span>
                    </div>
                </div>

                <div class="space-y-4 pt-2">
                    <p class="text-[10px] font-bold tracking-[0.2em] text-rose-300 uppercase">Upcoming Remembrance</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 rounded-2xl bg-white/40 border border-white/60">
                            <span id="oct24-countdown" class="serif block text-2xl text-rose-800">0</span>
                            <span class="text-[9px] text-rose-400 uppercase tracking-tighter font-semibold">Days to Oct 24</span>
                        </div>
                        <div class="p-4 rounded-2xl bg-white/40 border border-white/60">
                            <span id="oct29-countdown" class="serif block text-2xl text-rose-800">0</span>
                            <span class="text-[9px] text-rose-400 uppercase tracking-tighter font-semibold">Days to Oct 29</span>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <p class="serif italic text-rose-400 text-lg">Always in my heart</p>
                    <div class="mt-4 flex justify-center space-x-1">
                        <span class="w-1 h-1 rounded-full bg-rose-200"></span>
                        <span class="w-1 h-1 rounded-full bg-rose-200"></span>
                        <span class="w-1 h-1 rounded-full bg-rose-200"></span>
                    </div>
                </div>

                <div class="pt-4 spotify-container">
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/3iA2gUQ3MWeWB519XPq2V6?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startDate = new Date('2025-10-29T00:00:00');
        const overlay = document.getElementById('password-overlay');
        const passField = document.getElementById('pass-field');
        const mainContent = document.getElementById('main-content');
        const errorMsg = document.getElementById('error-msg');
        
        const yearEl = document.getElementById('year-count');
        const monthEl = document.getElementById('month-count');
        const detailDayEl = document.getElementById('detail-day-count');
        const dayEl = document.getElementById('day-count');
        
        const oct24El = document.getElementById('oct24-countdown');
        const oct29El = document.getElementById('oct29-countdown');

        // Password logic
        passField.addEventListener('input', (e) => {
            if (e.target.value === '1024') {
                unlock();
            } else if (e.target.value.length === 4) {
                errorMsg.style.opacity = '1';
                setTimeout(() => {
                    e.target.value = '';
                    errorMsg.style.opacity = '0';
                }, 1000);
            }
        });

        function unlock() {
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            overlay.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                mainContent.classList.add('revealed-content');
                updateCounter();
            }, 800);
        }

        function getDaysUntil(month, day) {
            const now = new Date();
            let year = now.getFullYear();
            let targetDate = new Date(year, month - 1, day);
            const todayReset = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if (targetDate < todayReset) {
                targetDate = new Date(year + 1, month - 1, day);
            }
            const diffTime = targetDate - todayReset;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function updateCounter() {
            const now = new Date();
            const difference = now - startDate;
            if (difference < 0) return;

            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const lastDayOfPrevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += lastDayOfPrevMonth;
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            const totalDays = Math.floor(difference / (1000 * 60 * 60 * 24));
            
            yearEl.innerText = years;
            monthEl.innerText = months;
            detailDayEl.innerText = days;
            dayEl.innerText = totalDays.toLocaleString();

            oct24El.innerText = getDaysUntil(10, 24);
            oct29El.innerText = getDaysUntil(10, 29);
        }

        setInterval(updateCounter, 60000); 
    </script>
</body>
</html>
